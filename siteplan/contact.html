<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NANSUKUSA KETRINE | SUPERPLEX | WDD131</title>

    <meta name="description" content="This website is created by Nansukusa Ketrine for Dynamic Web Fundamentals (WDD131)">
    <meta name="author" content="Nansukusa Ketrine">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/siteplan.css">
    <script src="scripts/contact.js" defer></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <img src="images/logo.jpg" alt="Superplex logo picture" class="logo">

            <button id="menu" aria-label="Toggle navigation">☰</button>

            <nav>
                <ul class="nav">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="references.html">Reference</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section>
            <h1>Contact Us</h1>

            <form id="contactForm">
                <label for="name">Full Name</label>
                <input type="text" id="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" required>

                <label for="part">
                    Spare Part Needed
                </label>
                <textarea id="part"></textarea>

                <button type="submit">
                    Submit Order Request
                </button>
            </form>

               
        <form method="get" action="review.html">

            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
                <option value="cpc">CPC</option>
                <option value="filters">Filters</option>
                <option value="nozzles">Nozzles</option>
            </select>

            <fieldset>
                <legend>Overall Rating</legend>

                <input type="radio" id="star1" name="rating" value="1" required>
                <label for="star1">☆</label>

                <input type="radio" id="star2" name="rating" value="2" required>
                <label for="star2">☆☆</label>

                <input type="radio" id="star3" name="rating" value="3" required>
                <label for="star3">☆☆☆</label>

                <input type="radio" id="star4" name="rating" value="4" required>
                <label for="star4">☆☆☆☆</label>

                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star5">☆☆☆☆☆</label>
            </fieldset>

            <label for="installDate">Date of Installation</label>
            <input
                type="date"
                id="installDate"
                name="installDate"
                required
            >

            <fieldset>
                <legend>Useful Features</legend>

                <input type="checkbox" id="feature1" name="durability" value="durability">
                <label for="feature1">Durability</label>

                <input type="checkbox" id="feature2" name="easeofuse" value="easeofuse">
                <label for="feature2">Ease of Use</label>

                <input type="checkbox" id="feature3" name="performance" value="performance">
                <label for="feature3">Performance</label>

                <input type="checkbox" id="feature4" name="design" value="design">
                <label for="feature4">Design</label>
            </fieldset>

            <label for="review">Written Review</label>
            <textarea
                id="review"
                name="review"
                rows="5"
            ></textarea>

            <label for="username">Your Name (Optional)</label>
            <input
                type="text"
                id="username"
                name="username"
            >

            <input type="submit" value="Submit Review">

        </form>

            <p id="message"></p>
        </section>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> Nansukusa Ketrine | Uganda</p>
        <p id="lastModified"></p>

        <nav>
            <ul class="nav-f">
                <li><a href="products.html">Products</a></li>
                <li><a href="home.html">Home</a></li>
                <li><a href="references.html">References</a></li>
            </ul>
        </nav>
    </footer>


</body>
</html>
